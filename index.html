<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Preconnect & Preload Fonts for Faster Rendering -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">
  <!-- Basic SEO -->
  <title>SwapnSave | Buy & Sell Used Campus Essentials Easily</title>
  <meta name="description"
    content="SwapnSave is your trusted campus marketplace to buy and sell used books, gadgets, furniture, and more. Save money, reduce waste, and swap essentials with students near you." />
  <meta name="keywords"
    content="SwapnSave, campus marketplace, buy used books, sell gadgets, student marketplace, used furniture, swap items, save money, eco-friendly shopping" />
  <meta name="author" content="SwapnSave Team" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SwapnSave | Buy & Sell Campus Essentials" />
  <meta property="og:description"
    content="Join SwapnSave, the student-friendly marketplace for swapping and saving. Buy or sell books, gadgets, furniture, and more across campuses." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:url" content="https://swapnsave.tech" />
  <meta property="og:site_name" content="SwapnSave" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SwapnSave | Buy & Sell Campus Essentials" />
  <meta name="twitter:description"
    content="Discover SwapnSave – a student marketplace to buy, sell, and swap essentials across campuses. Affordable, eco-friendly, and student-first." />
  <meta name="twitter:image" content="/logo.png" />

  <!-- Viewport & Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- Theme color for mobile browsers -->
  <!-- Light theme (white top bar in Chrome on Android) -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <!-- Dark theme fallback -->
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <!-- iOS Safari status bar -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- Windows tile color -->
  <meta name="msapplication-TileColor" content="#ffffff" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Optional: Preload Main JS for Faster Loading -->
  <link rel="preload" href="/src/main.jsx" as="script" />
</head>

<body>
  <div id="root"></div>

  <!-- Module Script -->
  <script type="module" src="/src/main.jsx" defer></script>
</body>

</html>
